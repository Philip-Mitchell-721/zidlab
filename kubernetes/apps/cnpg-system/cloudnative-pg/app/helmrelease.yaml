---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudnative-pg
spec:
  chart:
    spec:
      chart: cloudnative-pg
      version: 0.29.0
      sourceRef:
        kind: HelmRepository
        name: cloudnative-pg
  interval: 1h
  values:
    # The chart ships the postgresql.cnpg.io CRDs; let it manage them.
    crds:
      create: true
    # No Prometheus-operator CRDs installed yet — keep the operator's PodMonitor off.
    monitoring:
      podMonitorEnabled: false
