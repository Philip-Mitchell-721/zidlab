---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  chart:
    spec:
      chart: longhorn
      version: 1.12.0
      sourceRef:
        kind: HelmRepository
        name: longhorn
  interval: 1h
  values:
    defaultSettings:
      defaultDataPath: /var/lib/longhorn
      defaultReplicaCount: 3
      # reclaim disk from orphaned replica data automatically (v1.10+ replacement for orphanAutoDeletion)
      orphanResourceAutoDeletion: replica-data
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 3
    preUpgradeChecker:
      # the pre-upgrade hook job deadlocks under Flux-managed upgrades
      jobEnabled: false
