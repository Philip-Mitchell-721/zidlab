---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik
spec:
  hostnames: ["auth.${SECRET_DOMAIN}"]
  parentRefs:
    # External gateway (Cloudflare tunnel) — auth is reachable off-LAN for remote SSO.
    - name: envoy-external
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: authentik-server
          namespace: security
          port: 80
