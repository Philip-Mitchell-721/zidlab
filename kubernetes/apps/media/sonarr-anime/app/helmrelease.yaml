---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sonarr-anime
spec:
  chartRef:
    kind: OCIRepository
    name: sonarr-anime
  interval: 1h
  values:
    controllers:
      sonarr-anime:
        strategy: Recreate
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/sonarr
              tag: 4.0.19
            env:
              PUID: 1000
              PGID: 1000
              TZ: America/New_York
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      app:
        ports:
          http:
            port: &port 8989
    persistence:
      config:
        existingClaim: sonarr-anime-config
        globalMounts:
          - path: /config
      media:
        existingClaim: media-data
        globalMounts:
          - path: /data
    route:
      app:
        hostnames: ["sonarr-anime.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
