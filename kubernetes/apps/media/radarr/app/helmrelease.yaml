---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radarr
spec:
  chartRef:
    kind: OCIRepository
    name: radarr
  interval: 1h
  values:
    controllers:
      radarr:
        strategy: Recreate
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/radarr
              tag: 6.3.0
            env:
              PUID: 1000
              PGID: 1000
              TZ: America/New_York
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 25m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      app:
        ports:
          http:
            port: &port 7878
    persistence:
      config:
        existingClaim: radarr-config
        globalMounts:
          - path: /config
      media:
        existingClaim: media-data
        globalMounts:
          - path: /data
    route:
      app:
        hostnames: ["radarr.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
