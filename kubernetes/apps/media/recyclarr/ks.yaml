---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: recyclarr
spec:
  interval: 1h
  path: ./kubernetes/apps/media/recyclarr/app
  dependsOn:
    - name: radarr
    - name: sonarr
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: media
  wait: false
