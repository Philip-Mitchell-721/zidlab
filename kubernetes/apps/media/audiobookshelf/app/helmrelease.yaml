---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: audiobookshelf
spec:
  chartRef:
    kind: OCIRepository
    name: audiobookshelf
  interval: 1h
  values:
    controllers:
      audiobookshelf:
        # single writer to the RWO config/metadata volumes — don't run two pods at once
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/advplyr/audiobookshelf
              tag: 2.35.1
            env:
              TZ: America/New_York
              PORT: &port 80
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 2Gi
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      config:
        existingClaim: abs-config
        globalMounts:
          - path: /config
      metadata:
        existingClaim: abs-metadata
        globalMounts:
          - path: /metadata
      library:
        existingClaim: abs-library
        globalMounts:
          - path: /library
            readOnly: true
    route:
      app:
        # public via the Cloudflare tunnel; external-dns creates abs.<domain> automatically
        hostnames: ["abs.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
