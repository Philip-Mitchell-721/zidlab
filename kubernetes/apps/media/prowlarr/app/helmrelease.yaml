---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prowlarr
spec:
  chartRef:
    kind: OCIRepository
    name: prowlarr
  interval: 1h
  values:
    controllers:
      prowlarr:
        strategy: Recreate
        containers:
          app:
            image:
              repository: lscr.io/linuxserver/prowlarr
              tag: 2.4.0
            env:
              PUID: 1000
              PGID: 1000
              TZ: America/New_York
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        ports:
          http:
            port: &port 9696
    persistence:
      config:
        existingClaim: prowlarr-config
        globalMounts:
          - path: /config
    route:
      app:
        hostnames: ["prowlarr.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
