---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-smb
spec:
  chart:
    spec:
      chart: csi-driver-smb
      version: 1.20.3
      sourceRef:
        kind: HelmRepository
        name: csi-driver-smb
  interval: 1h
  values:
    # Installs the controller Deployment + a node DaemonSet (the mounter) on every node.
    # No default StorageClass is created, so Longhorn stays the cluster default.
    controller:
      replicas: 1
