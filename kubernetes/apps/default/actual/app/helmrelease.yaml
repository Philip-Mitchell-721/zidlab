---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: actual
spec:
  chartRef:
    kind: OCIRepository
    name: actual
  interval: 1h
  values:
    controllers:
      actual:
        # single writer to the RWO /data volume — never run two pods at once
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/actualbudget/actual
              tag: 26.7.0
            env:
              TZ: America/New_York
              ACTUAL_PORT: &port 5006
              ACTUAL_OPENID_DISCOVERY_URL: https://auth.${SECRET_DOMAIN}/application/o/actual/
              ACTUAL_OPENID_SERVER_HOSTNAME: https://actual.${SECRET_DOMAIN}
              ACTUAL_USER_CREATION_MODE: login
              # Public-facing: OIDC is the ONLY login method — Actual's own
              # password login is disabled so nothing but Authentik faces the net.
              ACTUAL_OPENID_ENFORCE: "true"
            envFrom:
              - secretRef:
                  name: actual-oidc
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      data:
        existingClaim: actual-data
        globalMounts:
          - path: /data
    route:
      app:
        # Public via the Cloudflare tunnel; external-dns publishes actual.<domain>.
        # Safe to expose because OIDC is enforced above (Authentik is the only door).
        hostnames: ["actual.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
